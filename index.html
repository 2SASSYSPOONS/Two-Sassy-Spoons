<!DOCTYPE html>
<html>
<head>
  <title>Sassy Side</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family: Montserrat, sans-serif;
      background:#2B1638;
      color:#F6E7D8;
    }

    .section {
      padding:70px 20px;
      text-align:center;
    }

    .btn {
      padding:14px 30px;
      background:#F6E7D8;
      color:#2B1638;
      border-radius:40px;
      text-decoration:none;
      display:inline-block;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      max-width:1000px;
      margin:auto;
    }

    .card {
      background:#3A1F2D;
      padding:15px;
      border-radius:20px;
    }

    img {
      width:100%;
      border-radius:15px;
    }
  </style>
</head>

<body>

<section class="section">
  <h1>The Sassy Side</h1>
  <p>Bold. Creative. Unapologetic.</p>

  <a href="index.html" class="btn">Back to Sweet</a>
</section>

<section class="section">
  <div class="grid">

    <div class="card">
      <img src="cupcake1.jpg">
      <h3>Luxury Cupcakes</h3>
    </div>

    <div class="card">
      <img src="cupcake2.jpg">
      <h3>Bold Designs</h3>
    </div>

    <div class="card">
      <img src="cupcake3.jpg">
      <h3>Dark Icing</h3>
    </div>

  </div>
</section>

</body>
</html>
